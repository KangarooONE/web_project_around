<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi sitio</title>
  <link rel="stylesheet" href="/pages/index.css" />
</head>
<body>
<div class="page">
  <header class="header">
   <img
   src="./images/logo.png"
   alt="Logo Around the World"
   class="header__logo"
   />
  </header>

  <section class="profile">

<div class="profile__avatar-wrapper">
        <img src="/images/jack.jpg" alt="Jacques Cousteau" class="profile__avatar">
        <button class="profile__avatar-edit-button" type="button" aria-label="Editar foto"></button>
      </div>

      <div class="profile__header">
        <div class="profile__info">
          <div class="profile__name-row">
            <h1  class="profile__name">Jacques Cousteau</h1>
          <button 
          class="profile__edit-button"
          type="button" 
          aria-label="Editar perfil"></button>
          </div>
          
          <p class="profile__description">Explorador</p>   
        </div>
        
      </div>
      <button class="profile__add-button" aria-label="Agregar nueva publicación">+</button>

  </section>
  <section class="elements">
    <ul class="elemnts__list"></ul>




  </section>
  

  <footer></footer>
</div>
</body>
</html>
