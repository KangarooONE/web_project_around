<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proyecto Around the U.S</title>
  <link rel="stylesheet" href="./pages/index.css" />
</head>

<body class="page">

  <header class="header">
    <img src="./images/logo.png" alt="Logo Around the World" class="header__logo" />
  </header>

  <main class="page__content">
    
    <section class="profile"  >
      <div class="profile__avatar-wrapper " >
        <img src="./images/jack.jpg" alt="Jacques Cousteau" class="profile__avatar" />
        <button class="profile__avatar-edit-button" type="button" aria-label="Editar foto"></button>
      </div>

      <div class="profile__header">
        <div class="profile__info">
          <div class="profile__name-row">
            <h1 class="profile__name">Jacques Cousteau</h1>
            <button class="profile__edit-button" type="button" aria-label="Editar perfil"></button>
          </div>
          <p class="profile__description">Explorador</p> 
        </div>
        <button class="profile__add-button" type="button" aria-label="Agregar nueva publicación"></button>
      </div>
    </section>
    
    <section class="cards">
      <ul class="cards__list">
    <!------CardsJavascript------>
      </ul>
    </section>

  </main> 

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 Around the U.S.</p>
  </footer>

  <div class="popup popup_type_edit-profile">
    <div class="popup__container">
      <button type="button" class="popup__close-button" aria-label="Cerrar ventana"></button>
      
      <form class="popup__form" name="edit-profile" novalidate>
        <h2 class="popup__title">Editar perfil</h2>
        
        <input id="name-input" type="text" name="name" class="popup__input popup__input_type_name" placeholder="Nombre" required minlength="2" maxlength="40" />
        <span class="popup__error" id="name-input-error"></span>

        <input id="about-input" type="text" name="about" class="popup__input popup__input_type_about" placeholder="Acerca de mí" required minlength="2" maxlength="200" />
        <span class="popup__error" id="about-input-error"></span>

        <button type="submit" class="popup__button" disabled>Guardar</button>
      </form>
    </div>
  </div>

  <div class="popup popup_type_add-card">
    <div class="popup__container">
      <button class="popup__close-button" type="button" aria-label="Cerrar"></button>
      
      <h2 class="popup__title">Nuevo lugar</h2>
      
      <form class="popup__form" name="add-card" novalidate>

        <input 
          id="title-input"
          class="popup__input popup__input_type_title" 
          type="text" 
          name="title" 
          placeholder="Título" 
          required 
          minlength="2" 
          maxlength="30"
        />
        <span class="popup__error" id="title-input-error"></span>
        <input 
          id="url-input"
          class="popup__input popup__input_type_url" 
          type="url" 
          name="link" 
          placeholder="Enlace a la imagen" 
          required
        />
        <span class="popup__error" id="url-input-error"></span>
        <button class="popup__button" type="submit" disabled>Crear</button>
        
      </form>
    </div>
  </div>

  <template id="card-template">
  <li class="card">
    <img src="" alt="" class="card__image" />
    
    <button class="card__delete-button" type="button" aria-label="Eliminar tarjeta"></button>
    
    <div class="card__content">
      <h2 class="card__title"></h2>
      
      <button class="card__like-button" type="button" aria-label="Me gusta"></button>
    </div>
  </li>
</template>

  <div class="popup popup_type_image">
      <div class="popup__image-container">
        <button type="button" class="popup__close-button" aria-label="Cerrar ventana"></button>
        <img src="#" alt="" class="popup__image">
        <p class="popup__caption"></p>
      </div>
  </div>

  <script type="module" src="./scripts/index.js" defer></script>
  <div id="toast-container" class="toast-container"></div>
</body>
</html>
